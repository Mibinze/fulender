          name: "Spieltag 1"        # DFL: 28.–30.08.2026
        - date: "2026-12-19"
          name: "Spieltag 14"       # DFL: 18.–20.12.2026 (letzter vor Winterpause)
        - date: "2027-01-09"
          name: "Spieltag 15"       # DFL: 08.–10.01.2027 (Rückrundenstart)
        - date: "2027-01-12"
          name: "Spieltag 16"       # DFL: 12.–13.01.2027 (Englische Woche nach Restart)
        - date: "2027-05-22"
          name: "Spieltag 34"       # DFL: 22.05.2027 (letzter Spieltag)

  - id: dfb_2026
    label: "DFB"
    description: "DFB-Pokal 2026/27"
