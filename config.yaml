    label: "BL"
    description: "1. Bundesliga 2026/27"
    api_shortcut: bl1
    api_season: 2026
    filter_teams: ["1. FC Köln"]
    placeholder:
      enabled: true
      type: bundesliga
      # Nur offiziell bestätigte Termine (DFL Rahmenterminkalender, Nov 2025)
