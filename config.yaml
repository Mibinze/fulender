    api_season: 2026
    filter_teams: ["1. FC Köln"]
    auto_deactivate: true
    placeholder:
      enabled: true
      type: dfb_pokal
      rounds:
        - name: "1. Runde"
          date: "2026-08-21"
        - name: "2. Runde"
          date: "2026-10-27"
        - name: "Achtelfinale"
          date: "2026-12-01"
        - name: "Viertelfinale"
          date: "2027-02-02"
        - name: "Halbfinale"
          date: "2027-04-20"
        - name: "Finale"
          date: "2027-05-29"

  - id: wm26
    label: "WM"
    description: "WM 2026"
    api_shortcut: wm26
    api_season: 2026
    filter_teams:
      - "Deutschland"
      - "Brasilien"
      - "Argentinien"
      - "Uruguay"
      - "Frankreich"
      - "Spanien"
      - "England"

